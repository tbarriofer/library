<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200">
    <div class="bg-slate-900 p-6 text-white text-center">
        <h1 class="text-3xl font-bold mb-4">📚 Mi Biblioteca</h1>
        <div class="flex justify-center gap-6 border-t border-slate-700 pt-4">
            <button onclick="showTab('list')" class="tab-btn active px-4 py-2 font-bold uppercase text-sm tracking-widest transition" id="btn-tab-list">Listar</button>
            <button onclick="showTab('save')" class="tab-btn px-4 py-2 font-bold uppercase text-sm tracking-widest transition" id="btn-tab-save">Guardar</button>
            <button onclick="showTab('search')" class="tab-btn px-4 py-2 font-bold uppercase text-sm tracking-widest transition" id="btn-tab-search">Buscar</button>
        </div>
    </div>

    <div class="p-6">
        <div id="tab-list" class="tab-content active">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Todos los Libros</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-gray-50 text-gray-500 uppercase text-xs font-bold">
                        <th class="p-4 border-b">Título</th>
                        <th class="p-4 border-b">Autor</th>
                        <th class="p-4 border-b">Estado</th>
                        <th class="p-4 border-b text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="bookTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-save" class="tab-content">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Registrar Nuevo Libro</h2>
            <div class="space-y-4 bg-gray-50 p-6 rounded-xl border border-gray-200">
                <input id="newTitle" type="text" placeholder="Título" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                <input id="newAuthor" type="text" placeholder="Autor" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                <select id="newStatus" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="Pendiente">Pendiente</option>
                    <option value="Leyendo">Leyendo</option>
                    <option value="Leído">Leído</option>
                </select>
                <button onclick="saveBook()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Confirmar y Guardar</button>
                <div id="saveFeedback" class="hidden text-center text-green-600 font-medium mt-2">¡Libro guardado con éxito!</div>
            </div>
        </div>

        <div id="tab-search" class="tab-content">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Buscador</h2>
            <div class="flex flex-col gap-4 p-6 bg-slate-50 rounded-xl border border-slate-200 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="searchTitle" type="text" placeholder="Filtrar por título..." class="p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
                    <input id="searchAuthor" type="text" placeholder="Filtrar por autor..." class="p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <button onclick="searchBooks()" class="bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition">Buscar</button>
            </div>

            <div id="searchResultsArea" class="hidden">
                <h3 class="text-lg font-semibold text-gray-600 mb-3 border-b pb-2">Resultados encontrados:</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                        <tr class="bg-blue-50 text-blue-800 uppercase text-xs font-bold">
                            <th class="p-4 border-b">Título</th>
                            <th class="p-4 border-b">Autor</th>
                            <th class="p-4 border-b">Estado</th>
                            <th class="p-4 border-b text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="searchTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div id="noResultsMessage" class="hidden p-10 text-center text-orange-500 font-medium italic">
                No se encontraron libros que coincidan con la búsqueda.
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8081/api/libros";

    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        document.getElementById(`btn-tab-${tabName}`).classList.add('active');
        if(tabName === 'list') loadBooks();
    }

    // Generador de filas reutilizable para Listar y Buscar
    function generateRowHtml(book, prefix) {
        return `
            <tr class="hover:bg-blue-50/50 border-b border-gray-100 transition">
                <td class="p-4"><input id="${prefix}-title-${book.id}" value="${book.title}" disabled class="bg-transparent w-full p-1 rounded"></td>
                <td class="p-4"><input id="${prefix}-author-${book.id}" value="${book.author}" disabled class="bg-transparent w-full p-1 rounded"></td>
                <td class="p-4">
                    <select id="${prefix}-status-${book.id}" disabled class="bg-transparent w-full p-1 rounded">
                        <option value="Leído" ${book.status === 'Leído' ? 'selected' : ''}>Leído</option>
                        <option value="Leyendo" ${book.status === 'Leyendo' ? 'selected' : ''}>Leyendo</option>
                        <option value="Pendiente" ${book.status === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                    </select>
                </td>
                <td class="p-4 flex justify-center gap-3">
                    <button onclick="enableEdit('${prefix}', ${book.id})" id="${prefix}-btn-edit-${book.id}" class="text-amber-600 font-bold text-sm">Modificar</button>
                    <button onclick="confirmUpdate('${prefix}', ${book.id})" id="${prefix}-btn-save-${book.id}" class="hidden bg-green-500 text-white px-2 py-1 rounded text-xs uppercase font-bold">Aceptar</button>
                    <button onclick="deleteBook(${book.id}, '${prefix}')" class="text-red-500 font-bold text-sm">Borrar</button>
                </td>
            </tr>`;
    }

    // --- ACCIONES DE API ---
    async function loadBooks() {
        try {
            const response = await fetch(API_URL);
            const books = await response.json();
            const tbody = document.getElementById('bookTableBody');
            tbody.innerHTML = books.length ? '' : '<tr><td colspan="4" class="p-10 text-center text-gray-400">Biblioteca vacía</td></tr>';
            books.forEach(book => tbody.innerHTML += generateRowHtml(book, 'list'));
        } catch (e) { console.error("Error al cargar:", e); }
    }

    async function saveBook() {
        const title = document.getElementById('newTitle').value;
        const author = document.getElementById('newAuthor').value;
        const status = document.getElementById('newStatus').value;
        if(!title || !author) return alert("Completa los campos");

        await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title, author, status })
        });

        document.getElementById('newTitle').value = '';
        document.getElementById('newAuthor').value = '';
        const feedback = document.getElementById('saveFeedback');
        feedback.classList.remove('hidden');
        setTimeout(() => feedback.classList.add('hidden'), 2000);
    }

    async function searchBooks() {
        const sTitle = document.getElementById('searchTitle').value.toLowerCase();
        const sAuthor = document.getElementById('searchAuthor').value.toLowerCase();
        const resultsArea = document.getElementById('searchResultsArea');
        const noResults = document.getElementById('noResultsMessage');
        const tbody = document.getElementById('searchTableBody');

        try {
            const response = await fetch(API_URL);
            const books = await response.json();
            const filtered = books.filter(b =>
                b.title.toLowerCase().includes(sTitle) &&
                b.author.toLowerCase().includes(sAuthor)
            );

            tbody.innerHTML = '';
            if (filtered.length > 0) {
                resultsArea.classList.remove('hidden');
                noResults.classList.add('hidden');
                filtered.forEach(book => tbody.innerHTML += generateRowHtml(book, 'search'));
            } else {
                resultsArea.classList.add('hidden');
                noResults.classList.remove('hidden');
            }
        } catch (e) { alert("Error al buscar"); }
    }

    // --- LÓGICA DE EDICIÓN Y BORRADO ---
    function enableEdit(prefix, id) {
        document.getElementById(`${prefix}-title-${id}`).disabled = false;
        document.getElementById(`${prefix}-author-${id}`).disabled = false;
        document.getElementById(`${prefix}-status-${id}`).disabled = false;
        document.getElementById(`${prefix}-title-${id}`).classList.add('bg-white', 'border');
        document.getElementById(`${prefix}-btn-edit-${id}`).classList.add('hidden');
        document.getElementById(`${prefix}-btn-save-${id}`).classList.remove('hidden');
    }

    async function confirmUpdate(prefix, id) {
        const dto = {
            title: document.getElementById(`${prefix}-title-${id}`).value,
            author: document.getElementById(`${prefix}-author-${id}`).value,
            status: document.getElementById(`${prefix}-status-${id}`).value
        };
        await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dto)
        });
        // Refrescar según dónde estemos
        if(prefix === 'list') loadBooks(); else searchBooks();
    }

    async function deleteBook(id, prefix) {
        if (confirm("¿Seguro que quieres borrar este libro?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if(prefix === 'list') loadBooks(); else searchBooks();
        }
    }

    // Carga inicial
    loadBooks();
</script>
</body>
</html>
